<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Easy Text Hider & Finder</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --radius-sm: 8px;
            --error: #ef4444;
            --success: #10b981;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 550px;
            border: 1px solid var(--border);
        }

        @media (min-width: 640px) {
            .container { padding: 32px; }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text);
        }

        /* Responsive Accessible Radio Grid Toggle */
        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background: var(--background);
            padding: 6px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .radio-option {
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .radio-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 44px; /* Tap Target friendly */
            padding: 8px 12px;
            background: transparent;
            cursor: pointer;
            border-radius: calc(var(--radius-sm) - 2px);
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0;
            transition: var(--transition);
            text-align: center;
            user-select: none;
        }

        .radio-option input[type="radio"]:checked + label {
            background: var(--surface);
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            font-weight: 600;
        }

        /* Form Inputs Optimized to prevent iOS zoom-on-focus (Must be at least 16px) */
        input[type="password"], textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 16px; 
            background-color: var(--surface);
            color: var(--text);
            outline: none;
            transition: var(--transition);
        }

        input[type="password"]:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .textarea-wrapper {
            position: relative;
            width: 100%;
        }

        textarea {
            resize: vertical;
            min-height: 140px;
            padding-bottom: 52px;
            -webkit-overflow-scrolling: touch;
        }

        /* Action Toolbar inside Inputs */
        .input-toolbar {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 6px;
            z-index: 5;
        }

        .util-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
            min-height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .util-btn:hover, .util-btn:active {
            background: var(--background);
            color: var(--text);
        }

        /* Strength Meter Indicator */
        .strength-meter {
            height: 4px;
            width: 100%;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-top: -4px;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            background: var(--error);
            transition: var(--transition);
        }

        /* Core Action Button */
        button[type="button"].action-btn {
            width: 100%;
            background-color: var(--primary);
            color: white;
            min-height: 48px;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        button[type="button"].action-btn:hover {
            background-color: var(--primary-hover);
        }
        
        button[type="button"].action-btn:active {
            transform: scale(0.99);
        }

        /* Status Panels */
        .status-banner {
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 12px;
            display: none;
            line-height: 1.4;
        }

        .status-banner.error {
            display: block;
            background: #fef2f2;
            color: var(--error);
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="appTitle">Text Hider & Finder</h1>

        <!-- Language Switcher -->
        <div class="form-group">
            <label id="langLabel">Choose Language / ቋንቋ ይምረጡ</label>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" id="langEN" name="language" value="en" checked>
                    <label for="langEN">English</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="langAM" name="language" value="am">
                    <label for="langAM">አማርኛ</label>
                </div>
            </div>
        </div>

        <!-- Op Switch -->
        <div class="form-group">
            <label id="opLabel">What do you want to do?</label>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" id="modeEncrypt" name="operation" value="encrypt" checked>
                    <label for="modeEncrypt" id="opEncryptLabel">Hide Text</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="modeDecrypt" name="operation" value="decrypt">
                    <label for="modeDecrypt" id="opDecryptLabel">Show Text</label>
                </div>
            </div>
        </div>

        <!-- Key Block -->
        <div class="form-group">
            <label for="secretKey" id="keyLabel">Lock Code / Password</label>
            <input type="password" id="secretKey" placeholder="Create a secret code to lock/unlock..." required>
            <div class="strength-meter"><div class="strength-bar" id="strengthBar"></div></div>
        </div>

        <!-- Working Input Area -->
        <div class="form-group">
            <label id="textLabel" for="mainText">Your Message</label>
            <div class="textarea-wrapper">
                <textarea id="mainText" placeholder="Type your normal message here..."></textarea>
                <div class="input-toolbar">
                    <button type="button" class="util-btn" id="pasteBtn">Paste</button>
                    <button type="button" class="util-btn" id="clearBtn">Clear</button>
                </div>
            </div>
        </div>

        <!-- Output Container Panel -->
        <div class="form-group" id="outputGroup" style="display: none; margin-top: 24px;">
            <label for="outputText" id="resultLabel">Result</label>
            <div class="textarea-wrapper">
                <textarea id="outputText" readonly style="background: var(--background); min-height: 120px; font-family: monospace;"></textarea>
                <div class="input-toolbar">
                    <button type="button" class="util-btn" id="copyBtn">Copy</button>
                </div>
            </div>
        </div>

        <button id="actionBtn" class="action-btn" type="button">Hide Message</button>
        <div id="errorBox" class="status-banner error"></div>
    </div>

    <script>
        // Simplified Cross-Platform Language Dictionary
        const i18n = {
            en: {
                title: "Text Hider & Finder",
                langLabel: "Choose Language / ቋንቋ ይምረጡ",
                opLabel: "What do you want to do?",
                encryptOpt: "Hide Text",
                decryptOpt: "Show Text",
                keyLabel: "Lock Code / Password",
                keyPlaceholder: "Create a secret code to lock/unlock...",
                labelEncrypt: "Your Message",
                labelDecrypt: "Hidden Code",
                placeholderEncrypt: "Type your normal message here...",
                placeholderDecrypt: "Paste the mixed hidden code here...",
                btnEncrypt: "Hide Message",
                btnDecrypt: "Show Message",
                clearBtn: "Clear",
                pasteBtn: "Paste",
                copyBtn: "Copy",
                copiedBtn: "Copied!",
                resultLabel: "Result",
                errRequired: "Please type a message and enter a secret lock code.",
                errEncryptFail: "Could not hide the text. Try again.",
                errDecryptFail: "Could not Show the text. The code might be wrong or the message was changed."
            },
            am: {
                title: "ጽሑፍ መደበቂያ እና ማውጫ",
                langLabel: "Choose Language / ቋንቋ ይምረጡ",
                opLabel: "ምን ማድረግ ይፈልጋሉ?",
                encryptOpt: "ጽሑፍ ደብቅ",
                decryptOpt: "ጽሑፍ አሳይ",
                keyLabel: "መቆለፊያ ኮድ / የይለፍ ቃል",
                keyPlaceholder: "ለመቆለፍ/ለመክፈት ሚስጥር ኮድ ያስገቡ...",
                labelEncrypt: "የእርስዎ መልዕክት",
                labelDecrypt: "የተደበቀው ምስጢር",
                placeholderEncrypt: "መዘበራረቅ የፈለጉትን ጽሑፍ እዚህ ይጻፉ/ያስገቡ...",
                placeholderDecrypt: "የተዘበራረቀውን የተደበቀ ጽሑፍ እዚህ ያስገቡ...",
                btnEncrypt: "ጽሑፉን ደብቅ",
                btnDecrypt: "ጽሑፉን መልስ",
                clearBtn: "Clear",
                pasteBtn: "Paste",
                copyBtn: "Copy",
                copiedBtn: "Copied!",
                resultLabel: "ውጤት",
                errRequired: "እባክዎ መልዕክት እና ሚስጥራዊ መቆለፊያ ኮድ ያስገቡ።",
                errEncryptFail: "ጽሑፉን መደበቅ አልተቻለም። እንደገና ይሞክሩ።",
                errDecryptFail: "ጽሑፉን ለማየት አልተቻለም ። ያስገቡት ኮድ ስህተት ሊሆን ይችላል ወይም ጽሑፉ ተቀይሯል።"
            }
        };

        const langEN = document.getElementById('langEN');
        const langAM = document.getElementById('langAM');
        const modeEncrypt = document.getElementById('modeEncrypt');
        const modeDecrypt = document.getElementById('modeDecrypt');
        
        const appTitle = document.getElementById('appTitle');
        const langLabel = document.getElementById('langLabel');
        const opLabel = document.getElementById('opLabel');
        const opEncryptLabel = document.getElementById('opEncryptLabel');
        const opDecryptLabel = document.getElementById('opDecryptLabel');
        const keyLabel = document.getElementById('keyLabel');
        const textLabel = document.getElementById('textLabel');
        const resultLabel = document.getElementById('resultLabel');
        
        const mainText = document.getElementById('mainText');
        const secretKey = document.getElementById('secretKey');
        const strengthBar = document.getElementById('strengthBar');
        const actionBtn = document.getElementById('actionBtn');
        const errorBox = document.getElementById('errorBox');
        
        const outputGroup = document.getElementById('outputGroup');
        const outputText = document.getElementById('outputText');
        const clearBtn = document.getElementById('clearBtn');
        const pasteBtn = document.getElementById('pasteBtn');
        const copyBtn = document.getElementById('copyBtn');

        function getSelectedLang() {
            return langAM.checked ? 'am' : 'en';
        }

        function updateUI() {
            const lang = getSelectedLang();
            const dict = i18n[lang];
            
            errorBox.style.display = 'none';
            outputGroup.style.display = 'none';
            outputText.value = '';

            appTitle.textContent = dict.title;
            langLabel.textContent = dict.langLabel;
            opLabel.textContent = dict.opLabel;
            opEncryptLabel.textContent = dict.encryptOpt;
            opDecryptLabel.textContent = dict.decryptOpt;
            keyLabel.textContent = dict.keyLabel;
            secretKey.placeholder = dict.keyPlaceholder;
            clearBtn.textContent = dict.clearBtn;
            pasteBtn.textContent = dict.pasteBtn;
            copyBtn.textContent = dict.copyBtn;
            resultLabel.textContent = dict.resultLabel;

            if (modeEncrypt.checked) {
                textLabel.textContent = dict.labelEncrypt;
                mainText.placeholder = dict.placeholderEncrypt;
                actionBtn.textContent = dict.btnEncrypt;
            } else {
                textLabel.textContent = dict.labelDecrypt;
                mainText.placeholder = dict.placeholderDecrypt;
                actionBtn.textContent = dict.btnDecrypt;
            }
        }

        langEN.addEventListener('change', updateUI);
        langAM.addEventListener('change', updateUI);
        modeEncrypt.addEventListener('change', updateUI);
        modeDecrypt.addEventListener('change', updateUI);

        // Code Security Indicator metrics logic
        secretKey.addEventListener('input', () => {
            const val = secretKey.value;
            let score = 0;
            if (val.length > 0) score += 25;
            if (val.length > 7) score += 25;
            if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score += 25;
            if (/[^A-Za-z0-9]/.test(val)) score += 25;
            
            strengthBar.style.width = score + '%';
            if (score <= 25) strengthBar.style.background = 'var(--error)';
            else if (score <= 75) strengthBar.style.background = '#f59e0b';
            else strengthBar.style.background = 'var(--success)';
        });

        clearBtn.addEventListener('click', () => {
            mainText.value = '';
            outputGroup.style.display = 'none';
            outputText.value = '';
            mainText.focus();
        });

        // Universal Clipboard Copy Solution (Works everywhere including iOS/Android Webviews)
        copyBtn.addEventListener('click', () => {
            if (!outputText.value) return;
            
            const textToCopy = outputText.value;
            const lang = getSelectedLang();

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showCopiedFeedback(lang);
                }).catch(() => fallbackCopy(outputText, lang));
            } else {
                fallbackCopy(outputText, lang);
            }
        });

        function fallbackCopy(element, lang) {
            element.select();
            element.setSelectionRange(0, 99999); // Mobile compatibility constraint
            try {
                document.execCommand('copy');
                showCopiedFeedback(lang);
            } catch (err) {
                console.error('Fallback fallback copy failed', err);
            }
        }

        function showCopiedFeedback(lang) {
            copyBtn.textContent = i18n[lang].copiedBtn;
            setTimeout(() => copyBtn.textContent = i18n[lang].copyBtn, 2000);
        }

        // Universal Clipboard Paste Solution
        pasteBtn.addEventListener('click', async () => {
            try {
                if (navigator.clipboard && navigator.clipboard.readText) {
                    const text = await navigator.clipboard.readText();
                    if(text) {
                        mainText.value = text;
                    }
                } else {
                    alert("To paste on this browser/device, tap inside the text area directly and use your device's pop-up paste action menu.");
                }
            } catch (err) {
                alert("Please tap inside the text box directly and use your device's built-in paste button due to security restrictions.");
            }
        });

        // Subtle Crypto Engine Logic
        async function deriveKey(password, salt) {
            const encoder = new TextEncoder();
            const baseKey = await window.crypto.subtle.importKey("raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]);
            return window.crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                baseKey,
                { name: "AES-GCM", length: 256 },
                false,
                ["encrypt", "decrypt"]
            );
        }

        async function encryptText(text, password) {
            const encoder = new TextEncoder();
            const salt = window.crypto.getRandomValues(new Uint8Array(16));
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveKey(password, salt);
            const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encoder.encode(text));
            const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
            combined.set(salt, 0);
            combined.set(iv, salt.length);
            combined.set(new Uint8Array(encrypted), salt.length + iv.length);
            return btoa(String.fromCharCode.apply(null, combined));
        }

        async function decryptText(base64Data, password) {
            const decoder = new TextDecoder();
            const combined = new Uint8Array(atob(base64Data).split("").map(c => c.charCodeAt(0)));
            const salt = combined.slice(0, 16);
            const iv = combined.slice(16, 28);
            const encrypted = combined.slice(28);
            const key = await deriveKey(password, salt);
            const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, encrypted);
            return decoder.decode(decrypted);
        }

        actionBtn.addEventListener('click', async () => {
            errorBox.style.display = 'none';
            const textValue = mainText.value.trim();
            const keyValue = secretKey.value;
            const lang = getSelectedLang();

            if (!textValue || !keyValue) {
                errorBox.textContent = i18n[lang].errRequired;
                errorBox.style.display = 'block';
                return;
            }

            try {
                let result = '';
                if (modeEncrypt.checked) {
                    result = await encryptText(textValue, keyValue);
                } else {
                    result = await decryptText(textValue, keyValue);
                }
                outputText.value = result;
                outputGroup.style.display = 'block';
                
                // Smart scroll layout calculation for smaller handheld items
                setTimeout(() => {
                    outputGroup.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);

            } catch (e) {
                errorBox.textContent = modeEncrypt.checked 
                    ? i18n[lang].errEncryptFail 
                    : i18n[lang].errDecryptFail;
                errorBox.style.display = 'block';
                outputGroup.style.display = 'none';
            }
        });

        // Initialize Native Screen Framework
        updateUI();
    </script>
</body>
</html>
